<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Analytics | Zero-Setup Business Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans antialiased">

    <nav class="container mx-auto p-6 flex justify-between items-center">
        <div class="text-2xl font-bold tracking-tighter text-blue-500">NexusData.</div>
        <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-full transition-all">
            Client Login
        </button>
    </nav>

    <header class="container mx-auto px-6 py-20 text-center">
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-6">
            Stop Wrestling with Data. <br>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">Start Making Decisions.</span>
        </h1>
        <p class="text-xl md:text-2xl text-gray-400 mb-10 max-w-3xl mx-auto">
            Connect Stripe, Shopify, and your CRM in one click. Get instant, unified business intelligence and predictive analytics without writing a single line of SQL.
        </p>
    </header>

    <section class="container mx-auto px-6 max-w-2xl pb-24">
        <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">
            <h3 class="text-2xl font-bold mb-6 text-center">Request Early Access & Architecture Review</h3>
            
            <form action="#" method="POST" id="leadForm" class="space-y-6">
                
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Company Name</label>
                    <input type="text" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Where does your data live? (Select all that apply)</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="flex items-center space-x-3 bg-gray-900 border border-gray-600 p-3 rounded-lg cursor-pointer hover:border-blue-500">
                            <input type="checkbox" class="form-checkbox text-blue-500 h-5 w-5">
                            <span>Stripe</span>
                        </label>
                        <label class="flex items-center space-x-3 bg-gray-900 border border-gray-600 p-3 rounded-lg cursor-pointer hover:border-blue-500">
                            <input type="checkbox" class="form-checkbox text-blue-500 h-5 w-5">
                            <span>Shopify</span>
                        </label>
                        <label class="flex items-center space-x-3 bg-gray-900 border border-gray-600 p-3 rounded-lg cursor-pointer hover:border-blue-500">
                            <input type="checkbox" class="form-checkbox text-blue-500 h-5 w-5">
                            <span>HubSpot/Salesforce</span>
                        </label>
                        <label class="flex items-center space-x-3 bg-gray-900 border border-gray-600 p-3 rounded-lg cursor-pointer hover:border-blue-500">
                            <input type="checkbox" class="form-checkbox text-blue-500 h-5 w-5">
                            <span>Custom SQL/Postgres</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Work Email</label>
                    <input type="email" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500">
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold py-4 rounded-lg shadow-lg transition-transform transform hover:scale-105">
                    Analyze My Business
                </button>
            </form>
        </div>
    </section>

</body>
</html>
